size: { width: 1248, height: 832 }

layers:
  # Background image
  - background:
      image: layouts/social-card-bg.png

  # Logo
  - background:
      image: layouts/logo.png
    size: { width: 200, height: 200 }
    offset: { x: 970, y: 44 }
    origin: start top

  # REslava.Result (dark slate)
  - typography:
      content: "REslava.Result"     
      font:
        family: Roboto
        style: Bold
      align: start top      
      color: "#1F2937"      
      line: 
        height: 1
        amount: 1
    size: { width: 1000, height: 155 }
    offset: { x: 60, y: 90 }

  # Title (dark slate)
  - typography:
      content: "{{ page.meta.title or page.title}}"     
      font:
        family: Roboto
        style: Bold
      align: start top      
      color: "#1F2937"      
      line: 
        height: 1
        amount: 2
    size: { width: 1140, height: 180 }
    offset: { x: 60, y: 248 }

  # Tagline
  - typography:
      content: "{{ page.meta.tagline or 'Railway-oriented .NET made simple.' }}"
      font:
        family: Roboto
        style: Bold
      line: 
        height: 1
        amount: 1
      color: "#0088BB"
      align: start top
    size: { width: 1120, height: 70 }
    offset: { x: 64, y: 420 }

  # Description (Inter 14pt, gray)
  - typography:
      content: "{{ page.meta.description or config.site_description }}"
      font:
        family: Inter
        style: Regular
      line: 
        height: 1.2
        amount: 4
      color: "#3B4553"
      align: start top
    size: { width: 1120, height: 280 }
    offset: { x: 64, y: 500 }

# Required tags for social media
tags:
  og:type: website
  og:title: "{{ page.title }} - {{ config.site_name }}"
  og:description: "{{ page.meta.description or config.site_description }}"
  og:image: "{{ image.url }}"
  og:image:type: "{{ image.type }}"
  og:image:width: "{{ image.width }}"
  og:image:height: "{{ image.height }}"
  og:url: "{{ page.canonical_url }}"

  twitter:card: summary_large_image
  twitter:title: "{{ page.title }} - {{ config.site_name }}"
  twitter:description: "{{ page.meta.description or config.site_description }}"
  twitter:image: "{{ image.url }}"